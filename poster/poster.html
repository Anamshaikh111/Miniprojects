<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musical Festival Poster</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>

    <link rel="stylesheet" href="poster.css">
</head>

<body>


<div class="poster-header text-center py-4">
    <h1>Electric Vibe Music Festival 2025</h1>
</div>

<div class="music-icon text-center mb-4">
    🎵🎵🎵
</div>


<div class="container">
    <div class="row justify-content-center text-center">

        <div class="col-6 col-md-2 mb-3">
            <button class="hero-btn w-100">DJ Nova</button>
        </div>

        <div class="col-6 col-md-2 mb-3">
            <button class="hero-btn w-100">Electric Beats</button>
        </div>

        <div class="col-6 col-md-2 mb-3">
            <button class="hero-btn w-100">SynthStorm</button>
        </div>

        <div class="col-6 col-md-2 mb-3">
            <button class="hero-btn w-100">Lunar Bass</button>
        </div>

        <div class="col-6 col-md-2 mb-3">
            <button class="hero-btn w-100">GlowRiders</button>
        </div>

    </div>
</div>


<div class="container my-5">
    <div class="row justify-content-center text-center">

        <div class="col-12 col-md-4 mb-4">
            <div class="buy-card p-4">
                <h4 class="name">Standard</h4>
                <div class="card-price">$49</div>
                <button class="card-btn">Buy Now</button>
            </div>
        </div>

        <div class="col-12 col-md-4 mb-4">
            <div class="buy-card p-4">
                <h4 class="name">VIP</h4>
                <div class="card-price">$99</div>
                <button class="card-btn">Buy Now</button>
            </div>
        </div>

        <div class="col-12 col-md-4 mb-4">
            <div class="buy-card p-4">
                <h4 class="name">Backstage</h4>
                <div class="card-price">$149</div>
                <button class="card-btn">Live Now</button>
            </div>
        </div>

    </div>
</div>


<div class="container my-5">
    <div class="accordion" id="festivalAccordion">

        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed"
                        data-bs-toggle="collapse"
                        data-bs-target="#food">
                    No Outside Food
                </button>
            </h2>
            <div id="food" class="accordion-collapse collapse"
                 data-bs-parent="#festivalAccordion">
                <div class="accordion-body">
                    Outside food and beverages are not permitted inside the festival grounds.
                </div>
            </div>
        </div>

        <div class="accordion-item mt-3">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed"
                        data-bs-toggle="collapse"
                        data-bs-target="#reentry">
                    Re-entry Policy
                </button>
            </h2>
            <div id="reentry" class="accordion-collapse collapse"
                 data-bs-parent="#festivalAccordion">
                <div class="accordion-body">
                    No re-entry allowed once you've exited the festival grounds.
                </div>
            </div>
        </div>

    </div>
</div>


<footer class="festival-footer text-center py-5">
    <div class="container">
        <h2 class="footer-name">Follow Us</h2>

        <div class="social-icons d-flex justify-content-center gap-4 fs-4">
            <a href="#"><i class="fa-brands fa-facebook"></i></a>
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
            <a href="#"><i class="fa-brands fa-twitter"></i></a>
        </div>
    </div>
</footer>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
